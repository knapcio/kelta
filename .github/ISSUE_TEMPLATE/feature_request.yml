name: Proposal
description: Propose an IR, compiler, runtime or tooling capability
title: "proposal: "
labels: [proposal]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workload or semantic gap cannot be expressed efficiently today?
    validations:
      required: true
  - type: textarea
    id: semantics
    attributes:
      label: Proposed semantics
      description: Describe observable behavior before discussing syntax.
    validations:
      required: true
  - type: textarea
    id: cost
    attributes:
      label: Runtime and compiler cost
      description: What state, indexes, bytes or compatibility complexity would this add?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
