name: Bug report
description: Report incorrect compiler, runtime, resume or DOM behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make Kelta's semantics precise.
  - type: input
    id: revision
    attributes:
      label: Version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest IR and transaction that demonstrate the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and transaction journal
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Compiler / validation
        - Transactions / rollback
        - Incremental queries
        - SSR / resume capsule
        - Browser DOM adapter
        - Documentation / tooling
    validations:
      required: true
